# Kamal 2.x — single-host Hetzner VPS deploy para agendao.
# Imagen construida localmente en Mac ARM con cross-build a amd64 vía QEMU.

service: agendao
image: franwer-ranger/agendao

servers:
  web:
    hosts:
      - 65.109.12.199
    # Un solo host: los uploads viven en el volumen local del server
    # (UPLOADS_DIR), así que dividir el tráfico entre varios hosts partiría
    # los ficheros subidos. Ver boot.limit abajo para el rolling deploy.

# Kamal 2.x reemplaza Traefik por kamal-proxy (HTTP/2, Let's Encrypt automático).
# app.agendao.xyz ya apunta a este host, así que el cert se emite solo en setup.
proxy:
  ssl: true
  host: app.agendao.xyz
  app_port: 3000
  healthcheck:
    path: /api/health
    interval: 3
    timeout: 30

registry:
  server: ghcr.io
  username: franwer-ranger
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    NODE_ENV: production
    PORT: '3000'
    HOSTNAME: 0.0.0.0
    NEXT_TELEMETRY_DISABLED: '1'
    # APP_URL lo lee lib/storage.ts para construir URLs absolutas.
    APP_URL: https://app.agendao.xyz
    # UPLOADS_DIR vive en el volumen persistente del host.
    UPLOADS_DIR: /app/data/uploads
  secret:
    - DATABASE_URL
    - RESEND_API_KEY
    - EMAIL_FROM
    - CRON_SECRET

# Host dir debe ser owned por uid 1001 (usuario nextjs del contenedor).
volumes:
  - '/var/lib/agendao/data:/app/data'

# limit 1 = despliega de uno en uno; con un único host garantiza stop-then-start
# para que dos contenedores no monten el mismo volumen de uploads a la vez.
boot:
  limit: 1
  wait: 2

aliases:
  shell: app exec --interactive --reuse "sh"
  logs: app logs -f
  migrate: app exec --reuse "node /app/scripts/migrate-prod.mjs"
